version: '3.9'

services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hp_user
      POSTGRES_PASSWORD: hp_password
      POSTGRES_DB: happiness_program
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hp_user -d happiness_program"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (optional — for job queues) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://hp_user:hp_password@postgres:5432/happiness_program
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_minimum_32_chars}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      # Email — set these in .env
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Canva — optional
      CANVA_CLIENT_ID: ${CANVA_CLIENT_ID:-}
      CANVA_CLIENT_SECRET: ${CANVA_CLIENT_SECRET:-}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  redis_data:
