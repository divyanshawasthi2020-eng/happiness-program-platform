server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass https://hp-backend-production-d616.up.railway.app/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host hp-backend-production-d616.up.railway.app;
        proxy_ssl_server_name on;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy uploads
    location /uploads/ {
        proxy_pass https://hp-backend-production-d616.up.railway.app/uploads/;
        proxy_set_header Host hp-backend-production-d616.up.railway.app;
        proxy_ssl_server_name on;
    }

    # React SPA all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
